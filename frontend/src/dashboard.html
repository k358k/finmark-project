<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMark - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container dashboard-variant">

    <div class="left-panel">
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-chart-line"></i>
                FinMark
            </div>
        </nav>

        <div class="welcome-text">
            <h1>Workspace <span>Dashboard.</span></h1>
            <p>Review real-time metrics and coordinate active management tools below.</p>
            
            <div class="placeholder-section">
                <h3>Quick Actions</h3>
                <div class="placeholder-actions">
                    <a href="products.html" id="view-products-btn" class="dashboard-link-btn" style="text-decoration: none;">
                        <i class="fa-solid fa-boxes-stacked"></i> View Products
                    </a>
                    
                    <a href="reports.html" id="view-reports-btn" class="dashboard-link-btn" style="text-decoration: none;">
                        <i class="fa-solid fa-square-poll-vertical"></i> View Reports
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-card order-card">
            <h2>Place New Order</h2>
            
            <form id="order-form">
                <label for="customer-name">Customer Name</label>
                <input 
                    type="text" 
                    id="customer-name" 
                    placeholder="Enter Customer Name" 
                    required
                >

                <label for="quantity">Quantity</label>
                <input 
                    type="number" 
                    id="quantity" 
                    placeholder="Enter Quantity" 
                    min="1" 
                    required
                >

                <label for="order-value">Order Value</label>
                <input 
                    type="number" 
                    id="order-value" 
                    placeholder="Enter Order Value" 
                    min="0" 
                    step="0.01" 
                    required
                >

                <button type="submit">
                    Submit Order
                </button>
            </form>

            <div id="order-message"></div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
