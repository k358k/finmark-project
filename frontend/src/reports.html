<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMark - Analytical Reports</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container dashboard-variant">

    <div class="left-panel">
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-chart-line"></i>
                FinMark
            </div>
        </nav>

        <div class="welcome-text">
            <h1>Operations <span>Analytics.</span></h1>
            <p>Process transaction streams dynamically using server-side business intelligence loops.</p>
            
            <div class="placeholder-section">
                <div class="placeholder-actions">
                    <button id="run-analytics-btn" style="width: 100%;">
                        <i class="fa-solid fa-rotate"></i> Run Analytics Engine
                    </button>
                </div>
                <a href="dashboard.html" style="color: rgba(255,255,255,0.7); display: inline-block; margin-top: 25px; text-decoration: none; font-size: 0.9rem;">
                    <i class="fa-solid fa-arrow-left"></i> Return to Workspace Dashboard
                </a>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-card order-card" style="width: 450px;">
            <h2>Calculated Summary Output</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px; text-align: center;">Aggregated metrics processed natively via Express server instances.</p>
            
            <div id="analytics-error-banner" style="display: none; background-color: #ffebe9; border: 1px solid #ffc2b3; color: #ff3b30; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 600;"></div>

            <div class="metric-output-group" style="margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
                <label style="font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">Total Aggregated Revenue</label>
                <h1 id="ui-total-revenue" style="margin: 5px 0 0 0; color: #333; font-size: 2.2rem;">$0.00</h1>
            </div>

            <div class="metric-output-group" style="margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
                <label style="font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">Gross Volumetric Asset Output</label>
                <h1 id="ui-total-volume" style="margin: 5px 0 0 0; color: #333; font-size: 2.2rem;">0 units</h1>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
